<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Simbologia para identificacao de croquis</title>
  <desc id="desc">Prancha visual com simbolos tecnicos usados para leitura de croquis eletricos.</desc>
  <defs>
    <style>
      .bg{fill:#fff}
      .frame{fill:none;stroke:#1f2933;stroke-width:2}
      .grid{fill:#f7fafc;stroke:#d8e0e7;stroke-width:1}
      .title{font:700 34px Arial,sans-serif;fill:#172028}
      .sub{font:400 16px Arial,sans-serif;fill:#52616b}
      .label{font:700 18px Arial,sans-serif;fill:#172028}
      .small{font:400 14px Arial,sans-serif;fill:#34444d}
      .line{stroke:#1f2933;stroke-width:3;fill:none}
      .dash{stroke:#1f2933;stroke-width:3;fill:none;stroke-dasharray:12 9}
      .red{stroke:#e11d22;stroke-width:3;fill:none}
      .reddash{stroke:#e11d22;stroke-width:3;fill:none;stroke-dasharray:10 8}
      .blue{stroke:#2078d4;stroke-width:3;fill:none}
      .brown{stroke:#8b5a2b;stroke-width:3;fill:none}
      .green{stroke:#15803d;stroke-width:3;fill:none}
      .yellow{fill:#fff36d;stroke:#1f2933;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="760"/>
  <rect class="frame" x="28" y="28" width="1224" height="704"/>
  <text class="title" x="56" y="78">Simbologia para identificacao</text>
  <text class="sub" x="56" y="106">Guia visual local para consulta durante revisao e montagem do croqui.</text>

  <g transform="translate(56 145)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <circle class="line" cx="64" cy="58" r="17"/>
    <circle class="line" cx="64" cy="58" r="5"/>
    <text class="label" x="118" y="52">Poste existente</text>
    <text class="small" x="118" y="76">No tecnico de rede</text>
  </g>

  <g transform="translate(356 145)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <circle class="line" cx="54" cy="58" r="16"/>
    <line class="line" x1="80" y1="58" x2="146" y2="58"/>
    <circle class="line" cx="172" cy="58" r="16"/>
    <text class="label" x="40" y="104">Poste a instalar</text>
  </g>

  <g transform="translate(656 145)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <line class="dash" x1="40" y1="66" x2="208" y2="66"/>
    <circle class="line" cx="62" cy="66" r="9"/>
    <circle class="line" cx="118" cy="66" r="9"/>
    <circle class="line" cx="174" cy="66" r="9"/>
    <text class="label" x="40" y="104">Rede existente</text>
  </g>

  <g transform="translate(956 145)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <line class="blue" x1="40" y1="66" x2="208" y2="66"/>
    <circle class="line" cx="62" cy="66" r="9"/>
    <circle class="line" cx="174" cy="66" r="9"/>
    <text class="label" x="40" y="104">Rede recondutorada</text>
  </g>

  <g transform="translate(56 315)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <line class="line" x1="42" y1="72" x2="124" y2="72"/>
    <line class="line" x1="74" y1="72" x2="106" y2="42"/>
    <circle class="line" cx="42" cy="72" r="5"/>
    <circle class="line" cx="124" cy="72" r="5"/>
    <text class="label" x="150" y="62">FU</text>
    <text class="small" x="150" y="86">Chave fusivel</text>
  </g>

  <g transform="translate(356 315)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <line class="line" x1="42" y1="72" x2="128" y2="72"/>
    <line class="line" x1="72" y1="72" x2="112" y2="50"/>
    <circle class="line" cx="42" cy="72" r="5"/>
    <circle class="line" cx="128" cy="72" r="5"/>
    <text class="label" x="150" y="62">FC</text>
    <text class="small" x="150" y="86">Chave faca</text>
  </g>

  <g transform="translate(656 315)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <circle class="line" cx="72" cy="66" r="24"/>
    <circle class="line" cx="104" cy="66" r="24"/>
    <text class="label" x="150" y="62">TR</text>
    <text class="small" x="150" y="86">Transformador</text>
  </g>

  <g transform="translate(956 315)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <line class="line" x1="80" y1="36" x2="80" y2="82"/>
    <line class="line" x1="56" y1="82" x2="104" y2="82"/>
    <line class="line" x1="62" y1="94" x2="98" y2="94"/>
    <line class="line" x1="68" y1="106" x2="92" y2="106"/>
    <text class="label" x="136" y="62">AT</text>
    <text class="small" x="136" y="86">Aterramento</text>
  </g>

  <g transform="translate(56 485)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <rect class="reddash" x="52" y="30" width="126" height="72" transform="rotate(-22 115 66)"/>
    <text class="label" x="52" y="116">Area de trabalho</text>
  </g>

  <g transform="translate(356 485)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <line class="red" x1="54" y1="82" x2="190" y2="38"/>
    <polyline class="red" points="170,35 190,38 176,54"/>
    <line class="red" x1="62" y1="44" x2="178" y2="94"/>
    <polyline class="red" points="160,98 178,94 167,78"/>
    <text class="label" x="52" y="116">Intervencao</text>
  </g>

  <g transform="translate(656 485)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <line class="brown" x1="46" y1="66" x2="212" y2="66"/>
    <circle class="line" cx="72" cy="66" r="9"/>
    <circle class="line" cx="186" cy="66" r="9"/>
    <text class="label" x="46" y="104">Rede nova</text>
  </g>

  <g transform="translate(956 485)">
    <rect class="grid" x="0" y="0" width="270" height="132" rx="6"/>
    <line class="green" x1="46" y1="66" x2="212" y2="66"/>
    <circle class="line" cx="72" cy="66" r="9"/>
    <circle class="line" cx="186" cy="66" r="9"/>
    <text class="label" x="46" y="104">Rede complementada</text>
  </g>

  <rect class="yellow" x="56" y="658" width="1168" height="34"/>
  <text class="small" x="74" y="680">Legenda acao: D - Desligar   L - Ligar   A - Abrir   F - Fechar   I - Incluir   E - Excluir</text>
</svg>
