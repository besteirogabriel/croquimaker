{% extends "base.html" %}
{% block title %}Simbologia oficial - JOBEL Croqui Engine{% endblock %}
{% block heading %}Simbologia oficial{% endblock %}
{% block content %}
  <section class="panel">
    <h2>Imagem de identificacao</h2>
    <div class="symbol-board-stack">
      {% for image in symbol_images %}
        <div class="symbol-board-wrap">
          <img class="symbol-board" src="{{ url_for('static', filename=image) }}" alt="Simbologia para identificacao de croquis">
        </div>
      {% endfor %}
    </div>
  </section>
{% endblock %}
