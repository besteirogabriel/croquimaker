<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - JOBEL Croqui Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body class="login-page">
    <main class="login-panel">
      <img src="{{ url_for('static', filename='img/jobel_logo.png') }}" alt="JOBEL Engenharia">
      <h1>JOBEL Croqui Engine</h1>
      <p>Interpretacao local e geracao tecnica de croquis RGE/CPFL</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post">
        <label>E-mail
          <input type="email" name="email" value="admin@jobel.local" autocomplete="username" required>
        </label>
        <label>Senha
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button class="btn primary" type="submit">Entrar</button>
      </form>
    </main>
  </body>
</html>
