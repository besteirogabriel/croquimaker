{% extends "base.html" %}
{% block title %}Novo processamento - JOBEL Croqui Engine{% endblock %}
{% block heading %}Novo processamento{% endblock %}
{% block content %}
  <form class="panel form-panel" method="post" enctype="multipart/form-data">
    <div class="form-note">
      <strong>Processamento output-first</strong>
      <span>O upload gera contrato, PDF, Excel e relatório de validação no mesmo fluxo.</span>
    </div>
    <label>Arquivo PDF
      <input type="file" name="pdf" accept="application/pdf" required>
    </label>
    <label>Tipo de processamento
      <select name="processing_type">
        <option value="automatico_local">Automatico local</option>
      </select>
    </label>
    <label>Observacoes internas
      <textarea name="notes" rows="4"></textarea>
    </label>
    <button class="btn primary" type="submit">Processar PDF</button>
  </form>
{% endblock %}
