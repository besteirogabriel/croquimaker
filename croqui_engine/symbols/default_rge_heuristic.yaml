version: "0.1-heuristic"
description: "Catalogo heuristico inicial para interpretacao local de croquis RGE/CPFL. Nao substitui documentacao oficial."

equipment_patterns:
  transformer:
    labels:
      - "TR"
      - "TRANSFORMADOR"
    regex:
      - "\\b\\d{6,8}\\s+\\d+[\\.,]?\\d*\\s*kVA\\b"
      - "TRT\\d+_15/380v"
    confidence: 0.75

  fuse_switch:
    labels:
      - "FU"
      - "CHAVE FUSIVEL"
    regex:
      - "FU\\s+\\d{5,8}"
      - "\\b\\d{5,8}\\s+\\d+K\\b"
    confidence: 0.75

  command_switch:
    labels:
      - "FC"
      - "FACA"
      - "Faca LB"
    regex:
      - "FC\\s+\\d{5,8}"
      - "Faca\\s+LB\\s+\\d{5,8}"
    confidence: 0.8

network_labels:
  mt:
    regex:
      - "\\bMT\\b"
      - "\\bAT\\b"
  bt:
    regex:
      - "\\bBT\\b"
  mixed:
    regex:
      - "AT/BT"
      - "AT\\s*/\\s*BT"

span_patterns:
  span_id: "\\bV\\d+-\\d+\\b"
  pole_id: "\\bP\\d+\\b"
  length_m: "\\d+[\\.,]\\d+\\s*m"
  cables:
    - "3E70-1A"
    - "3A02"
    - "3E70"
    - "A02"

work_area:
  red_dashed_rectangle:
    stroke_color_family: "red"
    dash_required: true
    confidence: 0.65

materials:
  common_regex:
    - "13/6AA"
    - "13/10AA"
    - "11/6AA"
    - "11/4AA"
    - "CE[0-9A-Z_-]+"
    - "EPP953"
    - "ET_[A-Z0-9_-]+"
    - "BC_10"
    - "BC_15"
    - "[36]S1L"
    - "TRT\\d+_15/380v"
